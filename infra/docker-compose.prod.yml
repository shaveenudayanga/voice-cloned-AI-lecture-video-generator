# SPDX-License-Identifier: Apache-2.0
# Production overlay. Usage:
#   docker compose -f infra/docker-compose.yml -f infra/docker-compose.prod.yml up -d

name: lecturevoice

services:
  api:
    restart: always
    image: lecturevoice-api:0.1.0
    labels:
      org.opencontainers.image.version: "0.1.0"
      org.opencontainers.image.title: "LectureVoice API"
      org.opencontainers.image.licenses: "Apache-2.0"

  worker-cpu:
    restart: always
    image: lecturevoice-worker-cpu:0.1.0
    labels:
      org.opencontainers.image.version: "0.1.0"
      org.opencontainers.image.title: "LectureVoice CPU Worker"
      org.opencontainers.image.licenses: "Apache-2.0"

  frontend:
    restart: always
    image: lecturevoice-frontend:0.1.0
    labels:
      org.opencontainers.image.version: "0.1.0"
      org.opencontainers.image.title: "LectureVoice Frontend"
      org.opencontainers.image.licenses: "Apache-2.0"

  postgres:
    restart: always

  valkey:
    restart: always
    command: valkey-server --appendonly yes --loglevel warning

  seaweedfs:
    restart: always

  nginx:
    image: nginx:1.27-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - api
      - frontend
