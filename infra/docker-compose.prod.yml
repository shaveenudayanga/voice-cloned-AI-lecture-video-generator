# Production overlay. Usage:
#   docker compose -f infra/docker-compose.yml -f infra/docker-compose.prod.yml up -d

name: lecturevoice

services:
  api:
    restart: always

  worker-cpu:
    restart: always

  frontend:
    restart: always

  postgres:
    restart: always

  valkey:
    restart: always
    command: valkey-server --appendonly yes --loglevel warning

  seaweedfs:
    restart: always

  nginx:
    image: nginx:1.27-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - api
      - frontend
